services:
  grafana:
    image: grafana/grafana:9.5.20
    container_name: grafana-hlc-local
    ports:
      - '3002:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: enteros-hlc-datasource
    volumes:
      - ./dist:/var/lib/grafana/plugins/enteros-hlc-datasource
    extra_hosts:
      - 'host.docker.internal:host-gateway'
