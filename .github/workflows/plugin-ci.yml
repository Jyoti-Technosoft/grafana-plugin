name: Plugin CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      # Keep local-Go path predictable in CI; avoids Docker/root-owned files
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build plugin (frontend + backend)
        run: npm run build

      - name: Package plugin zip
        run: npm run package

      - name: Upload dist assets
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: grafana-hlc-datasource-zip
          path: grafana-hlc-datasource.zip
          if-no-files-found: error
